<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실적 우선순위 도우미</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --paper:#F5F7F4;--card:#FFFFFF;--ink:#17201C;--muted:#68746B;--faint:#9AA69C;
    --line:#E2E6DF;--teal:#1E6E5C;--teal-soft:#E6F1EC;--teal-line:#BFDCD1;
    --amber:#A9701F;--amber-soft:#F6ECD9;--amber-line:#E6D2AC;
    --shadow:0 1px 2px rgba(23,32,28,.04),0 6px 20px rgba(23,32,28,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"IBM Plex Sans KR",system-ui,sans-serif;background:var(--paper);
    color:var(--ink);line-height:1.5;font-size:15px;padding:28px 20px 80px;}
  .wrap{max-width:880px;margin:0 auto}
  .mono{font-family:"IBM Plex Mono",monospace;font-feature-settings:"tnum"}
  header{margin-bottom:22px}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--teal);font-weight:500;margin-bottom:8px;}
  h1{font-size:26px;font-weight:700;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13.5px;margin-top:6px}
  .tag{display:inline-block;margin-left:8px;vertical-align:middle;
    font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.05em;
    border-radius:4px;padding:1px 7px;font-weight:500;}
  .tag.live{color:var(--teal);background:var(--teal-soft);border:1px solid var(--teal-line)}
  .tag.warn{color:var(--amber);background:var(--amber-soft);border:1px solid var(--amber-line)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);padding:18px;margin-bottom:20px;}
.searchbar{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);
    border-radius:10px;padding:0 12px;margin-bottom:14px}
  .searchbar .mag{color:var(--faint);font-size:14px}
  .searchbar input{border:none;background:transparent;padding:11px 0;font-size:14px;width:100%;outline:none;font-family:inherit;color:var(--ink)}
  .modes{display:flex;gap:6px;background:var(--paper);border:1px solid var(--line);
    border-radius:10px;padding:4px;margin-bottom:18px}
  .mode-btn{flex:1;border:none;background:none;cursor:pointer;padding:9px 10px;border-radius:7px;
    font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);transition:all .15s;line-height:1.3;}
  .mode-btn .desc{display:block;font-size:11px;font-weight:400;color:var(--faint);margin-top:1px}
  .mode-btn.on{background:var(--card);color:var(--teal);box-shadow:0 1px 2px rgba(23,32,28,.08)}
  .mode-btn.on .desc{color:var(--muted)}
  .fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:14px}
  .field.hidden{display:none}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field label .q{color:var(--faint);font-weight:400}
  select,input[type=number],input[type=month]{width:100%;font-family:inherit;font-size:14px;color:var(--ink);
    background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:9px 11px;
    outline:none;transition:border .15s,box-shadow .15s;}
  input[type=number],input[type=month]{font-family:"IBM Plex Mono",monospace}
  select:focus,input:focus{border-color:var(--teal-line);box-shadow:0 0 0 3px var(--teal-soft)}
  .range{display:none;margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);
    grid-template-columns:1fr auto 1fr;gap:10px;align-items:end;max-width:440px}
  .range.on{display:grid}
  .range .sep{padding-bottom:9px;color:var(--faint);font-size:13px}
  .hint{font-size:11.5px;color:var(--faint);margin-top:12px;line-height:1.5}
  .hint b{color:var(--amber);font-weight:600}
  .summary{display:flex;align-items:baseline;flex-wrap:wrap;gap:6px 10px;
    font-size:13.5px;color:var(--muted);margin:0 4px 12px;}
  .summary strong{color:var(--ink);font-weight:600}
  .summary .count{font-family:"IBM Plex Mono",monospace;color:var(--teal);font-weight:600}
  .list{display:flex;flex-direction:column;gap:9px}
  .row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
    display:grid;grid-template-columns:34px 1fr auto;gap:14px;align-items:start;transition:border .15s;}
  .row:hover{border-color:var(--teal-line)}
  .row.picked{border-color:var(--teal-line)}
  .row.backup{opacity:.62;background:#FbFcFa}
  .rank{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;
    color:var(--faint);text-align:center;padding-top:2px;}
  .row.picked .rank{color:var(--teal)}
  .r-main{min-width:0}
  .r-title{font-size:15px;font-weight:600;letter-spacing:-.005em;margin-bottom:3px}
  .r-meta{font-size:12.5px;color:var(--muted);margin-bottom:8px}
  .r-meta .dot{color:var(--faint);margin:0 6px}
  .r-note{font-size:12.5px;color:var(--faint);line-height:1.45}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .chip{font-size:11px;font-weight:500;padding:2px 8px;border-radius:5px;border:1px solid var(--line);
    color:var(--muted);background:var(--paper);display:inline-flex;align-items:center;gap:4px;}
  .chip.type{color:var(--ink)}
  .chip.sector{color:var(--ink)}
  .chip.secmatch{color:var(--teal);background:var(--teal-soft);border-color:var(--teal-line);font-weight:600}
  .chip.cert{color:var(--teal);background:var(--teal-soft);border-color:var(--teal-line)}
  .chip.page{color:var(--amber);background:var(--amber-soft);border-color:var(--amber-line)}
  .chip.doc{color:var(--ink);background:var(--paper)}
  .chip.company{color:var(--ink);background:var(--paper)}
  .chip.no{color:var(--faint);background:transparent;border-style:dashed}
  .chip a{color:inherit;text-decoration:none;border-bottom:1px solid currentColor}
  .r-amt{text-align:right;white-space:nowrap;padding-top:1px}
  .r-amt .won{font-family:"IBM Plex Mono",monospace;font-size:14.5px;font-weight:600;color:var(--ink)}
  .r-amt .cmp{font-size:11.5px;color:var(--faint);margin-top:2px}
  .r-amt .meet{display:inline-block;margin-top:6px;font-size:10.5px;font-weight:600;color:var(--teal);
    background:var(--teal-soft);border:1px solid var(--teal-line);padding:1px 6px;border-radius:4px;}
  .r-amt .miss{display:inline-block;margin-top:6px;font-size:10.5px;font-weight:500;color:var(--faint);
    border:1px solid var(--line);padding:1px 6px;border-radius:4px;}
  .cutline{display:flex;align-items:center;gap:12px;margin:6px 2px;
    font-family:"IBM Plex Mono",monospace;font-size:11.5px;letter-spacing:.03em;color:var(--teal);font-weight:600;}
  .cutline::before,.cutline::after{content:"";flex:1;height:1px;
    background:linear-gradient(90deg,transparent,var(--teal-line),transparent)}
  .msg{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:26px 22px;color:var(--muted);}
  .msg.setup{border-style:dashed}
  .msg h3{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:10px}
  .msg ol{margin:8px 0 0 18px;font-size:13px;line-height:1.7}
  .msg code{font-family:"IBM Plex Mono",monospace;font-size:12px;background:var(--paper);
    border:1px solid var(--line);border-radius:4px;padding:1px 5px}
  .msg.err{border-color:var(--amber-line);background:var(--amber-soft)}
  footer{margin-top:26px;font-size:11.5px;color:var(--faint);text-align:center;line-height:1.6}
  @media(max-width:640px){
    body{padding:20px 14px 60px}
    .fields{grid-template-columns:1fr 1fr}
    .row{grid-template-columns:28px 1fr;gap:10px}
    .r-amt{grid-column:2;text-align:left;margin-top:4px}
    .r-amt .meet,.r-amt .miss{margin-top:4px}
    .range{max-width:none}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">실적 검색 · 내부용</div>
    <h1>실적 우선순위 도우미<span class="tag warn" id="statusTag">연결 대기</span></h1>
    <p class="sub">과업유형·기간·금액/발주처를 넣으면, 실적이 우선순위대로 정렬돼요.</p>
  </header>

  <div class="panel" id="panel" style="display:none">
    <div class="searchbar"><span class="mag">🔎</span>
      <input type="search" id="q" placeholder="사업명·발주처·키워드로 검색 (예: 유튜브, 경기도)"></div>
    <div class="modes" id="modes">
      <button class="mode-btn on" data-mode="doc">서류용<span class="desc">정량 제출 · 금액과 건수로</span></button>
      <button class="mode-btn" data-mode="proposal">제안서용<span class="desc">본문 삽입 · 내용(발주처)으로</span></button>
    </div>
    <div class="fields">
      <div class="field" data-modes="both">
        <label>과업유형</label>
        <select id="type"><option value="전체">전체</option></select>
      </div>
      <div class="field" data-modes="both">
        <label>수행사</label>
        <select id="company"><option value="전체">전체</option></select>
      </div>
      <div class="field" data-modes="both">
        <label>실적 인정 기간 <span class="q">(수행 종료 기준)</span></label>
        <select id="period">
          <option value="전체">전체 기간</option>
          <option>최근 2년</option><option>최근 3년</option><option>최근 5년</option>
          <option>직접 지정</option>
        </select>
      </div>
      <div class="field" data-modes="doc" id="f-amount">
        <label>기준금액 <span class="q">(억원 · 선택)</span></label>
        <input type="number" id="amount" step="0.1" min="0" placeholder="예: 1.5">
      </div>
      <div class="field hidden" data-modes="proposal" id="f-sector">
        <label>발주처 유형</label>
        <select id="sector"><option value="전체">전체</option></select>
      </div>
      <div class="field count" data-modes="both">
        <label>필요 건수</label>
        <input type="number" id="count" min="1" value="10">
      </div>
    </div>
    <div class="range" id="f-range">
      <div><label>시작 <span class="q">(이후)</span></label><input type="month" id="rangeFrom"></div>
      <div class="sep">~</div>
      <div><label>종료 <span class="q">(이전)</span></label><input type="month" id="rangeTo"></div>
    </div>
    <p class="hint" id="hint"></p>
  </div>

  <div class="summary" id="summary" style="display:none"></div>
  <div class="list" id="list"></div>
  <footer id="footer"></footer>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ▼▼▼ 여기 한 줄만 바꾸면 됩니다 ▼▼▼
   구글 시트 → 파일 → 공유 → 웹에 게시 → '실적DB' 탭 + CSV → 게시 → 나온 링크를
   아래 따옴표 안에 붙여넣으세요.
   ═══════════════════════════════════════════════════════════════ */
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSlydOrhFTcP9fXbyziVvrtzWaoBgcpMnKRrqJqiKyMY_XIYes6P_dQssrBk2hoSO7ck8vzCkgPCLTu/pub?gid=987729029&single=true&output=csv";
/* ▲▲▲ 위 한 줄만 ▲▲▲ */

/* 고정 항목 매핑. 이 외에 '○○링크'로 끝나는 칸은 무엇이든 자동으로
   '○○ 보기' 첨부 버튼이 됩니다 (계약서링크, 준공계링크 등 자유롭게 추가 가능). */
const COLMAP = {
  "사업명":"title","발주처":"client","발주처유형":"sector","계약금액(원)":"amount",
  "수행시작":"start","수행종료":"end","과업유형":"type","수행사":"company","한줄설명":"note"
};
const TODAY = new Date();
const state = {mode:"doc",type:"전체",period:"전체",rangeFrom:"",rangeTo:"",amount:null,sector:"전체",count:10,q:"",company:"전체"};
let DATA = [];

const won = n => "₩"+n.toLocaleString("ko-KR");
function compact(n){const eok=Math.floor(n/1e8),man=Math.floor((n%1e8)/1e4);
  let s="";if(eok)s+=eok+"억";if(man)s+=(s?" ":"")+man.toLocaleString()+"만";return (s||n.toLocaleString())+"원";}
const ym = s => (s||"").replace("-",".");
function normMonth(s){if(!s)return"";const m=String(s).match(/(\d{4}).*?(\d{1,2})/);return m?`${m[1]}-${String(m[2]).padStart(2,"0")}`:String(s);}
function toNum(s){const n=parseInt(String(s).replace(/[^\d]/g,""),10);return isNaN(n)?0:n;}
function recentCutoff(n){const y=TODAY.getFullYear()-n,m=String(TODAY.getMonth()+1).padStart(2,"0");return `${y}-${m}`;}
function periodOK(r){const p=state.period;if(p==="전체")return true;
  if(p==="직접 지정"){if(state.rangeFrom&&r.end<state.rangeFrom)return false;if(state.rangeTo&&r.end>state.rangeTo)return false;return true;}
  return r.end>=recentCutoff({"최근 2년":2,"최근 3년":3,"최근 5년":5}[p]);}
function kwOK(r){const q=(state.q||"").trim().toLowerCase();if(!q)return true;
  const hay=(r.title+" "+r.client+" "+(r.note||"")+" "+r.sector+" "+r.type).toLowerCase();
  return q.split(/\s+/).every(t=>hay.includes(t));}

function mapRow(obj){
  const r={docs:[]};
  for(const k in obj){
    const key=(k||"").trim(), val=(obj[k]||"").trim();
    if(COLMAP[key]){ r[COLMAP[key]]=val; }
    else if(/링크$/.test(key) && val){ r.docs.push({label:key.replace(/링크$/,"").trim(), url:val}); }
  }
  r.amount=toNum(r.amount);r.start=normMonth(r.start);r.end=normMonth(r.end);
  r.sector=r.sector||"기타";r.type=r.type||"기타";r.company=r.company||"";
  r.cert=r.docs.some(d=>d.label.includes("증명서"));  // 서류용 필터: 실적증명서 보유 여부
  return r;
}

function compute(){
  let rows=DATA.filter(r=>(state.type==="전체"||r.type===state.type)&&(state.company==="전체"||r.company===state.company)&&periodOK(r)&&kwOK(r));
  if(state.mode==="doc"){
    rows=rows.filter(r=>r.cert);const base=state.amount;
    rows=rows.map(r=>({...r,meets:base?r.amount>=base:null}));
    rows.sort((a,b)=>{if(base&&a.meets!==b.meets)return a.meets?-1:1;if(a.end!==b.end)return a.end<b.end?1:-1;return b.amount-a.amount;});
  }else{
    const sec=state.sector,on=sec&&sec!=="전체";
    rows=rows.map(r=>({...r,secMatch:on?r.sector===sec:null}));
    rows.sort((a,b)=>{if(on&&a.secMatch!==b.secMatch)return a.secMatch?-1:1;if(a.end!==b.end)return a.end<b.end?1:-1;return b.amount-a.amount;});
  }
  return rows;
}
function periodLabel(){if(state.period==="전체")return null;
  if(state.period==="직접 지정")return `${state.rangeFrom?ym(state.rangeFrom):"…"}~${state.rangeTo?ym(state.rangeTo):"…"}`;
  return state.period;}

function fillOptions(){
  const types=[...new Set(DATA.map(r=>r.type).filter(Boolean))];
  const secs=[...new Set(DATA.map(r=>r.sector).filter(Boolean))];
  const tSel=document.getElementById("type"),sSel=document.getElementById("sector");
  types.forEach(t=>{const o=document.createElement("option");o.textContent=t;tSel.appendChild(o);});
  secs.forEach(s=>{const o=document.createElement("option");o.textContent=s;sSel.appendChild(o);});
  const comps=[...new Set(DATA.map(r=>r.company).filter(Boolean))];
  const cSel=document.getElementById("company");
  comps.forEach(x=>{const o=document.createElement("option");o.textContent=x;cSel.appendChild(o);});
}

function syncFields(){
  document.querySelectorAll(".field[data-modes]").forEach(f=>{const m=f.dataset.modes;
    f.classList.toggle("hidden",!(m==="both"||m===state.mode));});
  document.getElementById("f-range").classList.toggle("on",state.period==="직접 지정");
  document.getElementById("hint").innerHTML=state.mode==="doc"
    ? `※ 실적증명서 있는 건만, <b>‘계약금액 ≥ 기준금액’</b> 충족분을 먼저 정렬합니다. RFP별 유사실적 인정 기준은 <b>확인 필요</b>.`
    : `※ 증명서 유무와 무관하게, 선택한 <b>발주처 유형과 같은 실적</b>을 우선으로 올립니다.`;
  document.getElementById("footer").innerHTML=(state.mode==="doc"
      ? `정렬(서류용): 과업유형·기간 → 기준금액 충족 → 최신순 → 계약금액 순`
      : `정렬(제안서용): 과업유형·기간 → 발주처 유형 일치 → 최신순 → 계약금액 순`)
    + `<br>기간은 수행 종료일 기준, ‘최근 N년’은 오늘 기준 계산 — 실제 공고는 공고일 기준이라 확인 필요.`;
}

function render(){
  syncFields();
  const rows=compute();
  const N=Math.max(1,state.count|0);
  const modeLabel=state.mode==="doc"?"서류용":"제안서용";
  const pickLabel=state.mode==="doc"?"제출 대상":"추천";
  const list=document.getElementById("list"),summary=document.getElementById("summary");
  summary.style.display="flex";

  let parts=[`<strong>${state.type}</strong>`,modeLabel];
  const pl=periodLabel();if(pl)parts.push(pl);
  if((state.q||"").trim())parts.push(`검색 “${state.q.trim()}”`);
  if(state.mode==="doc"&&state.amount)parts.push(`기준 ${compact(state.amount)} 이상`);
  if(state.company!=="전체")parts.push(state.company);
  if(state.mode==="proposal"&&state.sector!=="전체")parts.push(`발주처 ${state.sector}`);
  const total=rows.length,pickCount=Math.min(N,total);
  summary.innerHTML=parts.join(' <span class="dot" style="color:var(--faint)">·</span> ')
    +` &nbsp;—&nbsp; 조건 충족 <span class="count">${total}건</span>`
    +(total>0?` 중 상위 <span class="count">${pickCount}건</span> ${pickLabel}`:"");

  if(total===0){list.innerHTML=`<div class="msg"><h3>조건에 맞는 실적이 없어요</h3>
    <p>기간을 넓히거나${state.mode==="doc"?", ‘제안서용’으로 바꾸거나":""} 과업유형을 ‘전체’로 해보세요.</p></div>`;return;}

  const docChip=d=>{
    const cls=d.label.includes("증명서")?"cert":(d.label.includes("제안서")?"page":"doc");
    return `<span class="chip ${cls}">✓ ${d.label} <a href="${d.url}" target="_blank" rel="noopener">보기</a></span>`;
  };

  let html="";
  rows.forEach((r,i)=>{
    const picked=i<N;
    if(i===N)html+=`<div class="cutline">여기까지 ${N}건 · ${pickLabel} — 아래는 예비</div>`;
    const secOn=state.mode==="proposal"&&state.sector!=="전체";
    const sectorChip=secOn&&r.secMatch?`<span class="chip secmatch">◎ ${r.sector} 일치</span>`:`<span class="chip sector">${r.sector}</span>`;
    const docsHtml=r.docs.length?r.docs.map(docChip).join(""):`<span class="chip no">첨부 없음</span>`;
    const rightTag=state.mode==="doc"&&state.amount!==null?(r.meets?`<span class="meet">금액 충족</span>`:`<span class="miss">기준 미달</span>`):"";
    html+=`<div class="row ${picked?'picked':'backup'}">
      <div class="rank">${picked?(i+1):"예비"}</div>
      <div class="r-main">
        <div class="r-title">${r.title}</div>
        <div class="r-meta">${r.client}<span class="dot">·</span>${ym(r.start)}–${ym(r.end)}</div>
        <div class="r-note">${r.note||""}</div>
        <div class="chips"><span class="chip type">${r.type}</span>${r.company?`<span class="chip company">🏢 ${r.company}</span>`:""}${sectorChip}${docsHtml}</div>
      </div>
      <div class="r-amt"><div class="won">${won(r.amount)}</div><div class="cmp">${compact(r.amount)}</div>${rightTag}</div>
    </div>`;
  });
  list.innerHTML=html;
}

function bind(){
  document.getElementById("modes").addEventListener("click",e=>{const b=e.target.closest(".mode-btn");if(!b)return;
    document.querySelectorAll(".mode-btn").forEach(x=>x.classList.remove("on"));b.classList.add("on");state.mode=b.dataset.mode;render();});
  document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value;render();});
  document.getElementById("type").addEventListener("change",e=>{state.type=e.target.value;render();});
  document.getElementById("period").addEventListener("change",e=>{state.period=e.target.value;render();});
  document.getElementById("rangeFrom").addEventListener("input",e=>{state.rangeFrom=e.target.value;render();});
  document.getElementById("rangeTo").addEventListener("input",e=>{state.rangeTo=e.target.value;render();});
  document.getElementById("company").addEventListener("change",e=>{state.company=e.target.value;render();});
  document.getElementById("sector").addEventListener("change",e=>{state.sector=e.target.value;render();});
  document.getElementById("count").addEventListener("input",e=>{state.count=e.target.value;render();});
  document.getElementById("amount").addEventListener("input",e=>{const v=parseFloat(e.target.value);
    state.amount=(!isNaN(v)&&v>0)?Math.round(v*1e8):null;render();});
}

function showSetup(){
  document.getElementById("statusTag").outerHTML=`<span class="tag warn" id="statusTag">URL 설정 필요</span>`;
  document.getElementById("list").innerHTML=`<div class="msg setup">
    <h3>구글 시트를 연결하면 시작됩니다</h3>
    <ol>
      <li>구글 시트에서 <code>파일 → 공유 → 웹에 게시</code></li>
      <li><b>실적DB</b> 탭 + <b>쉼표로 구분된 값(.csv)</b> → <b>게시</b></li>
      <li>나온 링크를 이 파일 위쪽 <code>SHEET_CSV_URL = ""</code> 따옴표 안에 붙여넣기</li>
    </ol></div>`;
}
function showError(){
  document.getElementById("statusTag").outerHTML=`<span class="tag warn" id="statusTag">불러오기 실패</span>`;
  document.getElementById("list").innerHTML=`<div class="msg err"><h3>데이터를 불러오지 못했어요</h3>
    <p>시트가 <b>웹에 게시(CSV)</b> 되어 있는지, 링크가 정확한지 확인해 주세요. (로컬 파일로 열면 막힐 수 있어요 — 웹주소로 여세요.)</p></div>`;
}
function loadData(){
  if(!SHEET_CSV_URL){showSetup();return;}
  document.getElementById("list").innerHTML=`<div class="msg">실적 데이터를 불러오는 중…</div>`;
  Papa.parse(SHEET_CSV_URL,{download:true,header:true,skipEmptyLines:true,
    complete:res=>{
      DATA=res.data.map(mapRow).filter(r=>r.title);
      if(!DATA.length){showError();return;}
      document.getElementById("statusTag").outerHTML=`<span class="tag live" id="statusTag">시트 연결됨 · ${DATA.length}건</span>`;
      document.getElementById("panel").style.display="block";
      fillOptions();bind();render();
    },
    error:()=>showError()
  });
}
loadData();
</script>
</body>
</html>
